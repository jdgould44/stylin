name: Fetch Instagram posts

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch posts
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: node scripts/fetch-instagram.mjs
      - name: Commit updated posts.json
        run: |
          if git diff --quiet posts.json 2>/dev/null; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add posts.json
          git commit -m "chore: refresh posts.json"
          git push
